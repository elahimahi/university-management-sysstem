<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Payment Gateway</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
        .container { max-width: 400px; margin: 0 auto; border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 10px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Mock Payment Gateway</h2>
        <p>Transaction ID: <span id="tranId"></span></p>
        <p>Amount: BDT <span id="amount"></span></p>
        <p>Payment Method: <span id="method"></span></p>

        <button onclick="simulateSuccess()">Pay Successfully</button>
        <button onclick="simulateFailure()">Cancel Payment</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tranId = urlParams.get('tran_id') || 'TXN_TEST';
        const amount = urlParams.get('amount') || '100';
        const method = urlParams.get('method') || 'bkash';

        document.getElementById('tranId').textContent = tranId;
        document.getElementById('amount').textContent = amount;
        document.getElementById('method').textContent = method.toUpperCase();

        function simulateSuccess() {
            // Redirect back to success URL
            window.location.href = 'http://localhost:3000/payment/success?tran_id=' + tranId + '&status=VALID';
        }

        function simulateFailure() {
            // Redirect back to success URL with failed status
            window.location.href = 'http://localhost:3000/payment/success?tran_id=' + tranId + '&status=FAILED';
        }
    </script>
</body>
</html>
