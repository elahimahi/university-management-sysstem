<!DOCTYPE html>
<html>
<head>
    <title>Debug - My Courses Issue</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #333; }
        .step { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 4px; }
        .step h3 { margin-top: 0; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button:hover { background: #0056b3; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        .warning { color: orange; font-weight: bold; }
        .info { color: blue; }
        input { padding: 8px; margin: 5px 0; width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Debug - My Courses Issue</h1>
        
        <div class="step">
            <h3>Step 1: Check API Backend</h3>
            <button onclick="checkBackend()">Check Backend Health</button>
            <div id="backendResult"></div>
        </div>

        <div class="step">
            <h3>Step 2: Login with Faculty Account</h3>
            <input type="email" id="email" value="faculty_demo@university.edu" placeholder="Email">
            <input type="password" id="password" value="password123" placeholder="Password">
            <button onclick="testLogin()">Test Login</button>
            <div id="loginResult"></div>
        </div>

        <div class="step">
            <h3>Step 3: Get Token & Check User</h3>
            <button onclick="checkToken()">Check Stored Token</button>
            <div id="tokenResult"></div>
        </div>

        <div class="step">
            <h3>Step 4: Fetch Faculty Courses</h3>
            <button onclick="fetchCourses()">Fetch My Courses</button>
            <div id="coursesResult"></div>
        </div>

        <div class="step">
            <h3>localStorage Contents</h3>
            <button onclick="showStorage()">Show All Storage</button>
            <div id="storageResult"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost/Database_Project/Database-main/Database-main/backend';

        function log(elementId, message, type = 'info') {
            const el = document.getElementById(elementId);
            if (typeof message === 'object') {
                message = JSON.stringify(message, null, 2);
            }
            const className = type;
            el.innerHTML = `<div class="${className}"><pre>${message}</pre></div>`;
        }

        async function checkBackend() {
            try {
                const res = await fetch(`${API_BASE}/health`);
                const data = await res.json();
                log('backendResult', `✓ Backend is running!\n${JSON.stringify(data, null, 2)}`, 'success');
            } catch (error) {
                log('backendResult', `✗ Backend error: ${error.message}`, 'error');
            }
        }

        async function testLogin() {
            try {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}`);
                }
                
                const data = await res.json();
                
                // Save token to localStorage
                if (data.tokens && data.tokens.accessToken) {
                    localStorage.setItem('authToken', data.tokens.accessToken);
                }
                
                log('loginResult', `✓ Login successful!\n\nUser: ${JSON.stringify(data.user, null, 2)}\n\nTokens: ${JSON.stringify(data.tokens, null, 2)}`, 'success');
            } catch (error) {
                log('loginResult', `✗ Login failed: ${error.message}`, 'error');
            }
        }

        async function checkToken() {
            const token = localStorage.getItem('authToken');
            
            if (!token) {
                log('tokenResult', '✗ No token found in localStorage. Please login first.', 'error');
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/debug/full-check`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                log('tokenResult', `✓ Token found!\n\nToken: ${token.substring(0, 50)}...\n\nAuth Check: ${JSON.stringify(data.authenticated_user, null, 2)}`, 'success');
            } catch (error) {
                log('tokenResult', `✗ Error checking token: ${error.message}`, 'error');
            }
        }

        async function fetchCourses() {
            try {
                const token = localStorage.getItem('authToken');
                
                if (!token) {
                    log('coursesResult', '✗ No token found! Please login first.', 'error');
                    return;
                }
                
                const res = await fetch(`${API_BASE}/faculty/courses`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const data = await res.json();
                
                if (res.ok && data.status === 'success') {
                    log('coursesResult', `✓ Courses fetched successfully!\n\nTotal: ${data.courses.length}\n\n${JSON.stringify(data.courses, null, 2)}`, 'success');
                } else {
                    log('coursesResult', `✗ API Error: ${JSON.stringify(data, null, 2)}`, 'error');
                }
            } catch (error) {
                log('coursesResult', `✗ Error fetching courses: ${error.message}`, 'error');
            }
        }

        function showStorage() {
            const storage = { ...localStorage };
            log('storageResult', JSON.stringify(storage, null, 2), 'info');
        }

        // Auto-check backend on page load
        window.onload = () => checkBackend();
    </script>
</body>
</html>
